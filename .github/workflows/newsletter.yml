name: Morning Newsletter

on:
  # schedule:
  #   # 8:00 AM PT = 15:00 UTC (PDT, UTC-7). Change to 16:00 in winter (PST, UTC-8).
  #   - cron: '0 15 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI for testing
  push:
    branches: [main]

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    # Allow the job to push watchlist.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pytz requests

      - name: Run newsletter agent
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:             ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:          ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL:          ${{ secrets.RECIPIENT_EMAIL }}
          FEEDBACK_WEBHOOK_URL:     ${{ secrets.FEEDBACK_WEBHOOK_URL }}
          NEWSLETTER_GITHUB_TOKEN:  ${{ secrets.NEWSLETTER_GITHUB_TOKEN }}
          GITHUB_REPO:              ${{ github.repository }}
        run: python newsletter.py

      - name: Commit updated watchlist
        run: |
          git config user.name  "Newsletter Bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git add watchlist.json || true
          git diff --staged --quiet || git commit -m "chore: update watchlist [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
